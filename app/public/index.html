<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenLayer Contract Scorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f172a;
      --surface: #1e293b;
      --raised:  #293548;
      --border:  #334155;
      --primary: #6366f1;
      --text:    #f1f5f9;
      --muted:   #94a3b8;
      --good:    #22c55e;
      --warn:    #eab308;
      --bad:     #ef4444;
      --mono:    'Cascadia Code','Fira Code','Consolas',monospace;
      --sans:    'Segoe UI',system-ui,-apple-system,sans-serif;
      --r:       8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 34px; height: 34px;
      background: var(--primary);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header p  { font-size: 12px; color: var(--muted); }

    /* ── Layout ── */
    .main {
      max-width: 860px;
      margin: 32px auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Inputs ── */
    textarea {
      width: 100%;
      height: 280px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.65;
      resize: vertical;
      outline: none;
      transition: border-color .15s;
    }
    textarea:focus { border-color: var(--primary); }
    textarea::placeholder { color: var(--muted); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      border-radius: var(--r);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity .15s, background .15s;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:not(:disabled):hover { background: #818cf8; }
    .btn-ghost {
      background: var(--raised);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:not(:disabled):hover { background: var(--border); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Notices ── */
    .notice {
      padding: 12px 16px;
      border-radius: var(--r);
      font-size: 13px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .notice-err {
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.25);
      color: #fca5a5;
    }
    .notice-warn {
      background: rgba(234,179,8,.08);
      border: 1px solid rgba(234,179,8,.25);
      color: #fde68a;
      font-size: 12px;
      margin-bottom: 4px;
    }

    /* ── Terminal log ── */
    .log {
      background: #080f1a;
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.75;
      max-height: 220px;
      overflow-y: auto;
      color: #7dd3fc;
    }
    .log-warn { color: var(--warn); }

    /* ── Score summary row ── */
    .scores {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .score-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px 16px 14px;
    }
    .score-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 10px;
    }
    .score-num {
      font-size: 42px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 10px;
    }
    .score-num.good { color: var(--good); }
    .score-num.mid  { color: var(--warn); }
    .score-num.bad  { color: var(--bad);  }
    .score-bar-track {
      height: 4px;
      background: var(--raised);
      border-radius: 99px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .6s ease;
    }
    .score-bar-fill.good { background: var(--good); }
    .score-bar-fill.mid  { background: var(--warn); }
    .score-bar-fill.bad  { background: var(--bad);  }

    /* ── Verdict badge ── */
    .verdict {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      margin-bottom: 20px;
    }
    .verdict.good { background: rgba(34,197,94,.12);  color: #86efac; border: 1px solid rgba(34,197,94,.25); }
    .verdict.mid  { background: rgba(234,179,8,.12); color: #fde68a; border: 1px solid rgba(234,179,8,.25); }
    .verdict.bad  { background: rgba(239,68,68,.12);  color: #fca5a5; border: 1px solid rgba(239,68,68,.25); }

    /* ── Vulnerabilities ── */
    .vuln-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .vuln-counts {
      display: flex;
      gap: 8px;
    }
    .vuln-count-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .vuln-count-badge.critical { background: rgba(239,68,68,.15); color: #fca5a5; }
    .vuln-count-badge.medium   { background: rgba(234,179,8,.15); color: #fde68a; }
    .vuln-count-badge.low      { background: rgba(34,197,94,.15); color: #bbf7d0; }

    .vuln-list { display: flex; flex-direction: column; gap: 6px; }
    .vuln-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg);
      border-radius: var(--r);
      border-left: 3px solid transparent;
    }
    .vuln-item.critical { border-color: var(--bad); }
    .vuln-item.medium   { border-color: var(--warn); }
    .vuln-item.low      { border-color: var(--good); }
    .vuln-badge {
      flex-shrink: 0;
      font-size: 10px; font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase; letter-spacing: .05em;
      margin-top: 2px;
    }
    .critical .vuln-badge { background: rgba(239,68,68,.18); color: #fca5a5; }
    .medium   .vuln-badge { background: rgba(234,179,8,.18);  color: #fde68a; }
    .low      .vuln-badge { background: rgba(34,197,94,.18);  color: #bbf7d0; }
    .vuln-desc { font-size: 13px; line-height: 1.4; }

    .no-vulns {
      color: var(--good);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(34,197,94,.06);
      border-radius: var(--r);
      border: 1px solid rgba(34,197,94,.2);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

.hidden { display: none !important; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">⬡</div>
  <div>
    <h1>GenLayer Contract Scorer</h1>
    <p>Audit Intelligent Contracts with an on-chain LLM</p>
  </div>
</header>

<!-- ── Main ── -->
<div class="main">

  <!-- Error -->
  <div class="notice notice-err hidden" id="errorNotice"></div>

  <!-- Source code input -->
  <div class="card">
    <div class="card-title">Contract Source Code</div>
    <textarea id="sourceCode" placeholder="Paste the full source code of the contract you want to audit…"></textarea>
    <div class="toolbar">
      <button class="btn btn-primary" id="scoreBtn" onclick="scoreContract()">
        Score Contract
      </button>
      <button class="btn btn-ghost btn-sm" onclick="loadExample()">
        Load example (bank_vault.py)
      </button>
      <button class="btn btn-ghost btn-sm hidden" id="refreshBtn" onclick="refreshResult()">
        ↻ Refresh result
      </button>
    </div>
  </div>

  <!-- Terminal output -->
  <div class="card hidden" id="logCard">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="card-title" style="margin:0">Output</div>
      <button class="btn btn-ghost btn-sm" onclick="clearLog()">Clear</button>
    </div>
    <div class="log" id="log"></div>
  </div>

  <!-- ── Audit result ── -->
  <div class="card hidden" id="resultCard">
    <div class="card-title">Audit Result</div>

    <!-- Verdict -->
    <div id="verdictBadge" class="verdict hidden"></div>

    <!-- Scores -->
    <div class="scores" id="scoresGrid">
      <div class="score-card">
        <div class="score-label">Overall</div>
        <div class="score-num" id="sOverall">—</div>
        <div class="score-bar-track"><div class="score-bar-fill" id="bOverall" style="width:0%"></div></div>
      </div>
      <div class="score-card">
        <div class="score-label">Code Quality</div>
        <div class="score-num" id="sQuality">—</div>
        <div class="score-bar-track"><div class="score-bar-fill" id="bQuality" style="width:0%"></div></div>
      </div>
      <div class="score-card">
        <div class="score-label">Security</div>
        <div class="score-num" id="sSecurity">—</div>
        <div class="score-bar-track"><div class="score-bar-fill" id="bSecurity" style="width:0%"></div></div>
      </div>
    </div>

    <!-- Vulnerabilities -->
    <div id="vulnSection">
      <div class="vuln-header">
        <div class="card-title" style="margin:0">Vulnerabilities</div>
        <div class="vuln-counts" id="vulnCounts"></div>
      </div>
      <div class="vuln-list" id="vulnList"></div>
    </div>

    <div class="no-vulns hidden" id="noVulns">✓ No vulnerabilities detected</div>

  </div>

</div>

<script>
  // ── Example ─────────────────────────────────────────────────────────────────
  async function loadExample() {
    const res = await fetch('/api/example');
    if (!res.ok) return showError('Could not load example file.');
    const { content } = await res.json();
    document.getElementById('sourceCode').value = content;
    hideError();
  }

  // ── Score ────────────────────────────────────────────────────────────────────
  let pollTimer = null;

  async function scoreContract() {
    const sourceCode = document.getElementById('sourceCode').value.trim();
    if (!sourceCode) return showError('Paste some source code first.');

    hideError();
    clearResult();
    showLog();
    setScoring(true);
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

    const res = await fetch('/api/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sourceCode }),
    });

    if (!res.ok) {
      const { error } = await res.json().catch(() => ({ error: 'Request failed' }));
      showError(error);
      setScoring(false);
      return;
    }

    const { txHash } = await res.json();
    appendLog(`→ Transaction submitted: ${txHash}`);
    appendLog(`→ Polling for status…`);

    let lastStatus = null;

    async function poll() {
      try {
        const r = await fetch(`/api/status/${txHash}`);
        if (!r.ok) {
          const { error } = await r.json().catch(() => ({ error: 'Status check failed' }));
          clearInterval(pollTimer); pollTimer = null;
          showError(error);
          setScoring(false);
          return;
        }
        const { status, done, result, error } = await r.json();
        if (status !== lastStatus) {
          appendLog(`  status: ${status}`);
          lastStatus = status;
        }
        if (done) {
          clearInterval(pollTimer); pollTimer = null;
          if (error) {
            showError(error);
          } else {
            appendLog('→ Transaction accepted. Reading result…');
            renderResult(result);
            show('refreshBtn');
          }
          setScoring(false);
        }
      } catch (e) {
        clearInterval(pollTimer); pollTimer = null;
        showError('Connection error: ' + e.message);
        setScoring(false);
      }
    }

    poll();
    pollTimer = setInterval(poll, 4000);
  }

  async function refreshResult() {
    hideError();
    const res = await fetch('/api/result');
    if (!res.ok) { showError('Failed to read result from contract.'); return; }
    const { data } = await res.json();
    clearResult();
    renderResult(data);
  }

  // ── Render result ────────────────────────────────────────────────────────────
  function renderResult(data) {
    show('resultCard');

    // ── Scores ──
    if (data.overall !== null) {
      setScore('sOverall',  'bOverall',  data.overall);
      setScore('sQuality',  'bQuality',  data.quality);
      setScore('sSecurity', 'bSecurity', data.security);
      show('scoresGrid');

      // Verdict badge
      const grade = gradeClass(data.overall);
      const labels = { good: '✓ Looks Good', mid: '⚠ Needs Attention', bad: '✕ High Risk' };
      const badge = document.getElementById('verdictBadge');
      badge.textContent = labels[grade];
      badge.className = `verdict ${grade}`;
      show('verdictBadge');
    } else {
      hide('scoresGrid');
      hide('verdictBadge');
    }

    // ── Vulnerabilities ──
    const vulns = data.vulnerabilities || [];
    if (vulns.length) {
      // Sort: critical → medium → low
      const order = { critical: 0, medium: 1, low: 2 };
      vulns.sort((a, b) => (order[a.severity] ?? 3) - (order[b.severity] ?? 3));

      // Counts
      const counts = { critical: 0, medium: 0, low: 0 };
      vulns.forEach(v => { if (counts[v.severity] !== undefined) counts[v.severity]++; });
      document.getElementById('vulnCounts').innerHTML = ['critical','medium','low']
        .filter(s => counts[s] > 0)
        .map(s => `<span class="vuln-count-badge ${s}">${counts[s]} ${s}</span>`)
        .join('');

      document.getElementById('vulnList').innerHTML = vulns.map(v => `
        <div class="vuln-item ${esc(v.severity)}">
          <span class="vuln-badge">${esc(v.severity)}</span>
          <span class="vuln-desc">${esc(v.description)}</span>
        </div>
      `).join('');
      show('vulnSection');
      hide('noVulns');
    } else if (data.overall !== null) {
      hide('vulnSection');
      show('noVulns');
    } else {
      hide('vulnSection');
    }

  }

  function setScore(numId, barId, score) {
    const cls = gradeClass(score);
    const numEl = document.getElementById(numId);
    numEl.textContent = score;
    numEl.className = `score-num ${cls}`;
    const barEl = document.getElementById(barId);
    barEl.style.width = `${score}%`;
    barEl.className = `score-bar-fill ${cls}`;
  }

  function gradeClass(score) {
    return score >= 70 ? 'good' : score >= 40 ? 'mid' : 'bad';
  }

  function clearResult() {
    hide('resultCard');
    hide('verdictBadge');
    hide('noVulns');
    document.getElementById('vulnList').innerHTML = '';
    document.getElementById('vulnCounts').innerHTML = '';
    show('vulnSection');
    show('scoresGrid');
  }


  // ── Log ──────────────────────────────────────────────────────────────────────
  function showLog() {
    show('logCard');
    document.getElementById('log').innerHTML = '';
  }

  function clearLog() {
    document.getElementById('log').innerHTML = '';
    hide('logCard');
  }

  function appendLog(text, isWarn) {
    const box = document.getElementById('log');
    const line = document.createElement('div');
    if (isWarn) line.className = 'log-warn';
    line.textContent = text;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  }

  // ── Scoring state ────────────────────────────────────────────────────────────
  function setScoring(on) {
    const btn = document.getElementById('scoreBtn');
    btn.disabled = on;
    btn.innerHTML = on
      ? `<div class="spinner"></div> Scoring…`
      : 'Score Contract';
  }

  // ── Error ────────────────────────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('errorNotice');
    el.innerHTML = `<span>✕</span><span>${esc(msg)}</span>`;
    el.classList.remove('hidden');
  }
  function hideError() { hide('errorNotice'); }

  // ── Utils ────────────────────────────────────────────────────────────────────
  const show = id => document.getElementById(id).classList.remove('hidden');
  const hide = id => document.getElementById(id).classList.add('hidden');
  const esc  = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
</script>
</body>
</html>
